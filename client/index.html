<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta
      name="description"
      content="LinkUp - Find and create events with people who share your interests"
    />
    <title>LinkUp</title>
    <!-- Add Google Maps API script with async loading -->
    <script>
      function initMap() {
        window.googleMapsLoaded = true;
        // Dispatch event for components to know Maps is ready
        window.dispatchEvent(new Event('googleMapsLoaded'));
      }
    </script>
    <script async defer
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAe-Pbph_NOLid06z7L474BusVKohP_LtY&libraries=places,geometry&callback=initMap">
    </script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
